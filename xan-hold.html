<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steward of a Hold · Xan</title>
  <style>
:root {
  --bg: #0d1014; --bg2: #151a20; --panel: #1b2129; --line: #2a323c;
  --ink: #e6e2d8; --dim: #8a8f98; --gold: #ffd479; --good: #7fd18b;
  --warn: #e6b155; --bad: #e5736b; --accent: #7fa8d1;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  --serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--mono); font-size: 14px; line-height: 1.4;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.dim { color: var(--dim); }
.good { color: var(--good); } .warn { color: var(--warn); } .bad { color: var(--bad); }
h1, h2, h3 { font-family: var(--serif); font-weight: 600; margin: 0; }

/* topbar */
#topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid var(--line); background: var(--bg2);
  flex: 0 0 auto;
}
.brand { font-size: 15px; }
.right { display: flex; align-items: center; gap: 12px; font-size: 12px; }
button {
  font-family: var(--mono); font-size: 13px; cursor: pointer;
  border: 1px solid var(--line); background: var(--panel); color: var(--ink);
  padding: 6px 12px; border-radius: 6px; transition: .12s;
}
button:hover { border-color: var(--accent); }
button.primary { background: var(--gold); color: #23252b; border-color: var(--gold); font-weight: 600; }
button.primary:hover { filter: brightness(1.08); }
button.ghost { background: transparent; }

/* ---- founding ---- */
#founding { flex: 1 1 auto; display: flex; min-height: 0; }
.mapwrap { flex: 1 1 auto; position: relative; min-width: 0; }
#map { display: block; width: 100%; height: 100%; }
.maphint { position: absolute; left: 12px; bottom: 10px; font-size: 11px; max-width: 60%;
  background: rgba(13,16,20,.7); padding: 4px 8px; border-radius: 5px; pointer-events: none; }
.side { flex: 0 0 380px; border-left: 1px solid var(--line); background: var(--bg2);
  display: flex; flex-direction: column; overflow-y: auto; }
.dossier { padding: 18px; }
.empty { padding: 40px 0; text-align: center; }
.dhead h2 { font-size: 22px; }
.tier { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
.blurb { font-family: var(--serif); font-size: 15px; line-height: 1.5; color: #d8d2c4; }
.statline { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; margin: 12px 0; padding: 10px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.statline b { color: var(--ink); }
.rich { margin: 12px 0; }
.richrow { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 13px; }
.bar { color: var(--gold); letter-spacing: 1px; font-size: 13px; }
.feats { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 16px; }
.chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--panel); border: 1px solid var(--line); }
.chip em { color: var(--dim); font-style: normal; }
.chip.den, .chip.nest, .chip.rookery { border-color: #5a2f3a; color: #e5a0a0; }
.chip.volcano { border-color: #7a3320; color: #e0a080; }
#foundBtn { width: 100%; margin-top: 6px; padding: 11px; font-size: 14px; }
.ghost { margin-top: 8px; width: 100%; color: var(--dim); }
.roster { padding: 0 18px 18px; }
.rlabel { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 8px 0 6px; }
.rosterItem { display: block; width: 100%; text-align: left; margin-bottom: 6px; }
.rosterItem em { color: var(--dim); font-style: normal; float: right; }

/* ---- hold ---- */
#hold { flex: 1 1 auto; grid-template-rows: auto auto 1fr; padding: 16px; gap: 14px; min-height: 0; overflow: hidden; }
.holdhead { display: flex; justify-content: space-between; align-items: flex-end; }
.holdhead h1 { font-size: 28px; }
.people { display: flex; gap: 18px; font-size: 13px; }
.people b { color: var(--ink); }
.resbar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.res { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
.ricon { font-size: 22px; }
.rval { font-size: 18px; font-weight: 600; }
.rval .cap { font-size: 12px; color: var(--dim); font-weight: 400; }
.rrate { font-size: 11px; }
.rrate.up { color: var(--good); } .rrate.down { color: var(--bad); } .rrate.flat { color: var(--dim); }
.cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; min-height: 0; }
.panel { background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; min-height: 0; }
.panel h2 { font-size: 16px; margin-bottom: 10px; flex: 0 0 auto; }
.buildings { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; overflow-y: auto; align-content: start; }
.bld { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
.bld.owned { border-color: #3a4653; }
.bhead { display: flex; justify-content: space-between; align-items: baseline; }
.bname { font-family: var(--serif); font-size: 15px; }
.blv { font-size: 11px; color: var(--gold); }
.bdesc { font-size: 11px; color: var(--dim); line-height: 1.35; }
.bdetail { font-size: 11px; color: var(--accent); }
.bbuy { margin-top: 4px; font-size: 12px; }
.bbuy .c { color: var(--good); } .bbuy .c.short { color: var(--bad); }
.bbuy.no { opacity: .6; }
.rcol { display: grid; grid-template-rows: auto 1fr; gap: 14px; min-height: 0; }
.market { flex: 0 0 auto; }
.logpanel { min-height: 0; }
#market { display: flex; flex-direction: column; gap: 5px; }
.trow { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center; }
.tname { font-size: 12.5px; }
.tbtn { font-size: 11px; padding: 4px 8px; }
.tbtn.sell { color: var(--good); }
.tbtn.no { opacity: .45; }
.log { overflow-y: auto; font-size: 12.5px; display: flex; flex-direction: column; gap: 6px; }
.logline { padding: 6px 9px; border-radius: 6px; background: var(--panel); border-left: 3px solid var(--line); }
.logline.raid { border-left-color: var(--bad); }
.logline.note { border-left-color: var(--accent); }

/* ---- away modal ---- */
.away:empty { display: none; }
.away { position: fixed; inset: 0; background: rgba(8,10,13,.82); display: flex; align-items: center; justify-content: center; z-index: 20; }
.awaybox { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 26px 30px; max-width: 460px; text-align: center; }
.awaybox h3 { font-size: 19px; margin-bottom: 14px; }
.awaygains { display: flex; flex-wrap: wrap; gap: 8px 16px; justify-content: center; font-size: 16px; margin-bottom: 14px; }
.awaybox .primary { margin-top: 18px; }

@media (max-width: 820px) {
  .side { flex-basis: 300px; }
  .resbar { grid-template-columns: repeat(3, 1fr); }
  .cols { grid-template-columns: 1fr; }
  /* Stacked columns are taller than the viewport — let the hold scroll. */
  #hold { overflow-y: auto; }
  .buildings, .log { overflow: visible; }
  .cols, .rcol, .logpanel { min-height: auto; }
}

</style>
</head>
<body>
  <header id="topbar">
    <div class="brand">⛰ <b>Steward of a Hold</b> <span class="dim">— a hold-builder in the world of Xan</span></div>
    <div class="right"><span id="worldMeta" class="dim"></span> <button id="toMap" class="ghost">the map</button></div>
  </header>

  <!-- Founding screen: pick a generated seat -->
  <main id="founding">
    <section class="mapwrap"><canvas id="map"></canvas>
      <div class="maphint dim">Each dot is a seat the world-sim generated. Hover to read it; click to inspect; found your hold.</div>
    </section>
    <aside class="side">
      <div id="dossier" class="dossier"><div class="dim empty">Pick a seat on the map to read its dossier.</div></div>
      <div id="roster" class="roster"></div>
    </aside>
  </main>

  <!-- Hold screen: the idle game -->
  <main id="hold" style="display:none">
    <header class="holdhead">
      <div><h1 id="holdName"></h1><div id="holdSub" class="dim"></div></div>
      <div id="people" class="people"></div>
    </header>
    <div id="resbar" class="resbar"></div>
    <section class="cols">
      <div class="panel">
        <h2>Works of the Hold</h2>
        <div id="buildings" class="buildings"></div>
      </div>
      <div class="rcol">
        <div class="panel market" id="marketPanel">
          <h2>Market</h2>
          <div id="market"></div>
        </div>
        <div class="panel logpanel">
          <h2>Chronicle</h2>
          <div id="log" class="log"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="away" class="away"></div>

(function(){
// world.js — read-only adapter over the snapshot dumped from xan-world-sim.
// The sim is a data quarry: we never write back to it. Everything here
// decodes the flat scene.Snapshot (row-major grids + seat/realm/feature
// lists) into the vocabulary the hold game speaks — local resources,
// danger, and lore — for one chosen seat.

const W = window.WORLD;
const GW = W.w, GH = W.h;
const idx = (x, y) => y * GW + x;
const inBounds = (x, y) => x >= 0 && y >= 0 && x < GW && y < GH;

// Go marshals []uint8 (the road grid) as a base64 string. Decode once.
const ROAD = (() => {
  if (typeof W.road !== 'string') return W.road || [];
  const bin = atob(W.road);
  const a = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
  return a;
})();

// Region ids (mirror internal/world/world.go). Only the ones we read.
const REG = {
  PLATEAU: 1, MOUNTAIN: 2, CRADLE: 3, BRINE: 4, EASTSEA: 5, DROWNED: 7,
  DOAB: 8, CLIFF: 9, FOOTHILL: 10, GLACIER: 11, AGRARIA: 12, AGRUPLAND: 13,
  LAKE: 14, FOREST: 15, TUNDRA: 16, MARSH: 17, PASS: 23, DEN: 24, NEST: 25,
  ROOKERY: 26, VOLCANO: 29, LAVA: 30,
};
const REG_NAME = {
  1: 'plateau', 2: 'mountain', 3: 'cradle', 4: 'the Brine', 5: 'the East Sea',
  7: 'drowned coast', 8: 'doab', 9: 'cliff', 10: 'foothill', 11: 'glacier',
  12: 'Agraria shelf', 13: 'upland', 14: 'lake', 15: 'forest', 16: 'tundra',
  17: 'marsh', 23: 'pass', 24: 'dragon den', 25: 'drake nest',
  26: 'wyvern rookery', 29: 'volcano', 30: 'lava field',
};

// Seat tiers (mirror the RegionSeat.. block).
const TIER = { 18: 'seat', 19: 'march', 20: 'headwater', 21: 'outhold', 22: 'reach', 27: 'capital', 31: 'saltern' };

const regionAt = (x, y) => (inBounds(x, y) ? W.region[idx(x, y)] : 0);
const isSea = (r) => r === REG.BRINE || r === REG.EASTSEA || r === REG.DROWNED;

// scanNeighborhood walks the cells within `r` of a seat and tallies the
// raw signal the economy is derived from.
function scanNeighborhood(sx, sy, r) {
  const t = {
    cells: 0, forest: 0, mountain: 0, foothill: 0, cliff: 0, plateau: 0,
    cradle: 0, agraria: 0, tundra: 0, marsh: 0, lake: 0, sea: 0, glacier: 0,
    salt: 0, salinity: 0, riverMax: 0, road: 0, fertility: 0,
    dens: 0, nests: 0, rookeries: 0, volcanoes: 0, passes: 0,
    rock: {},
  };
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const x = sx + dx, y = sy + dy;
      if (!inBounds(x, y)) continue;
      const i = idx(x, y);
      const reg = W.region[i];
      if (!reg) continue;
      t.cells++;
      // Inverse-distance weight so the immediate hinterland counts most.
      const d = Math.max(1, Math.abs(dx) + Math.abs(dy));
      const wgt = 1 / d;
      t.salt += (W.salt[i] || 0) * wgt;
      t.salinity += (W.salinity[i] || 0) * wgt;
      t.riverMax = Math.max(t.riverMax, W.river[i] || 0);
      t.road += ROAD[i] ? wgt : 0;
      t.rock[W.rock[i]] = (t.rock[W.rock[i]] || 0) + 1;
      switch (reg) {
        case REG.FOREST: t.forest += wgt; t.fertility += 0.7 * wgt; break;
        case REG.MOUNTAIN: t.mountain += wgt; break;
        case REG.FOOTHILL: t.foothill += wgt; t.fertility += 0.2 * wgt; break;
        case REG.CLIFF: t.cliff += wgt; break;
        case REG.PLATEAU: t.plateau += wgt; t.fertility += 0.1 * wgt; break;
        case REG.CRADLE: case REG.DOAB: t.cradle += wgt; t.fertility += 1.0 * wgt; break;
        case REG.AGRARIA: case REG.AGRUPLAND: t.agraria += wgt; t.fertility += 0.8 * wgt; break;
        case REG.TUNDRA: t.tundra += wgt; t.fertility += 0.05 * wgt; break;
        case REG.MARSH: t.marsh += wgt; t.fertility += 0.3 * wgt; break;
        case REG.LAKE: t.lake += wgt; break;
        case REG.GLACIER: t.glacier += wgt; break;
        case REG.DEN: t.dens++; break;
        case REG.NEST: t.nests++; break;
        case REG.ROOKERY: t.rookeries++; break;
        case REG.VOLCANO: t.volcanoes++; break;
        case REG.PASS: t.passes++; break;
        default: if (isSea(reg)) t.sea += wgt;
      }
    }
  }
  // River adds fertility (alluvium) and a little sea proxy for fishing.
  if (t.riverMax > 0) t.fertility += Math.min(2, t.riverMax * 0.25);
  return t;
}

// The six things a hold can gather. Each maps to a local signal.
const RESOURCES = ['food', 'timber', 'stone', 'ore', 'salt', 'coin'];

// deriveHold turns a raw seat into a fully-specified playable hold:
// its local resource richness (0..~1 each), danger, ancestry/tier flavor,
// and the buildings its geography unlocks.
function deriveHold(seat) {
  const n = scanNeighborhood(+seat.x, +seat.y, 4);
  const cell = idx(+seat.x, +seat.y);

  // Richness 0..1 per resource, calibrated against the continent's own
  // distribution so a march reads ore/stone, a river-seat food, a
  // saltern salt — not everything at once. (Forests and roads are common
  // here, so their divisors are large; salt is rare, so it's cheap.)
  const rich = {
    food: clamp01(n.fertility / 18 + Math.min(0.22, n.riverMax * 0.02) + n.lake * 0.03),
    timber: clamp01(n.forest / 22),
    stone: clamp01((n.mountain + n.foothill + n.cliff) / 8),
    ore: clamp01((n.mountain + n.volcanoes * 3) / 6),
    salt: clamp01(n.salt / 4 + n.salinity / 12 + (seat.tier === 31 ? 0.45 : 0)),
    coin: clamp01(Math.max(0, n.road - 2) / 6 + n.sea * 0.04 + n.passes * 0.06
      + (seat.tier === 27 ? 0.35 : 0) + (seat.tier === 18 ? 0.1 : 0)),
  };
  const setting = dominantSetting(n);

  const danger = clamp01((n.dens * 0.28 + n.nests * 0.18 + n.rookeries * 0.12 + n.volcanoes * 0.06)
    + (seat.pressure || 0) / 40);

  const realm = W.realms.find((r) => r.id === seat.realm) || null;
  const tierName = TIER[seat.tier] || 'hold';

  return {
    id: `${seat.x},${seat.y}`,
    x: +seat.x, y: +seat.y,
    name: seat.name,
    tier: seat.tier, tierName,
    ancestry: seat.ancestryLabel,
    allegiance: seat.allegiance,
    pressure: seat.pressure,
    realm: realm ? realm.name : 'the free holds',
    realmCrown: realm ? realm.isCrown : false,
    region: setting,
    elev: Math.round(W.elev[cell] || 0),
    temp: Math.round((W.temp[cell] || 0) * 10) / 10,
    rich, danger, n,
    nearby: nearbyFeatures(+seat.x, +seat.y),
    blurb: holdBlurb(seat, tierName, rich, danger, n),
  };
}

// nearbyFeatures lists named POIs close enough to color a hold's story.
function nearbyFeatures(sx, sy) {
  const out = [];
  for (const f of W.features) {
    const d = Math.abs(+f.x - sx) + Math.abs(+f.y - sy);
    if (d <= 8) out.push({ kind: f.kind, name: f.name, dist: d });
  }
  out.sort((a, b) => a.dist - b.dist);
  return out.slice(0, 5);
}

// dominantSetting names the terrain a hold sits in from its weighted tally.
function dominantSetting(n) {
  const cand = [['forest', n.forest], ['mountain', n.mountain], ['foothill country', n.foothill],
    ['cliffs', n.cliff], ['high plateau', n.plateau], ['cradle lowland', n.cradle],
    ['Agraria shelf', n.agraria], ['tundra', n.tundra], ['marsh', n.marsh],
    ['lakeshore', n.lake], ['coast', n.sea]];
  cand.sort((a, b) => b[1] - a[1]);
  return cand[0][1] > 0.5 ? cand[0][0] : 'wildland';
}

function holdBlurb(seat, tierName, rich, danger, n) {
  const top = Object.entries(rich).sort((a, b) => b[1] - a[1])[0][0];
  const anc = { Northern: 'mammoth-blood of the frozen north', Coastal: 'shore-farmers of the receded coast', cradle: 'the hybrid river-stock of the cradle' }[seat.ancestryLabel] || 'settled folk';
  const tierLore = {
    march: 'a wall-hold on the mountain’s edge — the frontier against the wilds',
    headwater: 'a sacred source at a river’s head, old and contested',
    seat: 'a river-seat on a navigable stretch',
    outhold: 'a lean frontier outhold',
    reach: 'a far reach of its realm',
    capital: 'the crown seat of its realm',
    saltern: 'a salt-works hall — salt is power',
  }[tierName] || 'a settled hold';
  const richWord = { food: 'good ground and water', timber: 'deep forest', stone: 'stone and crag', ore: 'ore in the rock', salt: 'salt in the earth', coin: 'roads and trade' }[top];
  const dangerWord = danger > 0.55 ? ' Dragons roost close — it will bleed.' : danger > 0.25 ? ' The wilds press at it.' : ' The country around is quiet.';
  return `${seat.name} is ${tierLore}, held by ${anc}. Its wealth is ${richWord}.${dangerWord}`;
}

function clamp01(v) { return Math.max(0, Math.min(1, v)); }

// allHolds derives every seat once, sorted capital-first then by name.
function allHolds() {
  const holds = W.seats.map(deriveHold);
  const rank = { 27: 0, 31: 1, 19: 2, 20: 3, 18: 4, 21: 5, 22: 6 };
  holds.sort((a, b) => (rank[a.tier] - rank[b.tier]) || a.name.localeCompare(b.name));
  return holds;
}

window.XAN = { W, GW, GH, idx, inBounds, ROAD, REG, REG_NAME, TIER, regionAt, isSea, deriveHold, allHolds, RESOURCES };
})();

(function(){
// map.js — paints the generated continent onto a canvas for the founding
// screen and lets the player pick a seat to settle. Pure read of the
// snapshot; terrain colors echo the sim's own palette in spirit.

const { W, GW, GH, idx, REG } = window.XAN;

// Terrain color per region id — a legible, muted continent.
function terrainColor(reg, elev, temp) {
  switch (reg) {
    case REG.BRINE: case REG.EASTSEA: return '#1c3a52';
    case REG.DROWNED: return '#274b63';
    case REG.LAKE: return '#2f6a8f';
    case REG.GLACIER: return '#dbe7ef';
    case REG.TUNDRA: return '#8a9a86';
    case REG.MARSH: return '#4a5f43';
    case REG.FOREST: return '#2f5233';
    case REG.CRADLE: case REG.DOAB: return '#6f7d3e';
    case REG.AGRARIA: case REG.AGRUPLAND: return '#8a8a4a';
    case REG.FOOTHILL: return '#7a6a4d';
    case REG.CLIFF: return '#6b5d4a';
    case REG.MOUNTAIN: return '#8d8578';
    case REG.PLATEAU: return '#9a8f6d';
    case REG.VOLCANO: return '#5a2b28';
    case REG.LAVA: return '#7a3320';
    case REG.PASS: return '#7d7358';
    case REG.DEN: case REG.NEST: case REG.ROOKERY: return '#5a2f3a';
    default: return reg ? '#555' : '#0d1014';
  }
}

// paintTerrain renders the base map into an offscreen buffer at grid scale
// then draws it up to the display canvas at an integer pixel scale.
function makeTerrainBitmap() {
  const buf = document.createElement('canvas');
  buf.width = GW; buf.height = GH;
  const bx = buf.getContext('2d');
  const img = bx.createImageData(GW, GH);
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      const i = idx(x, y);
      const reg = W.region[i];
      const c = hexToRgb(terrainColor(reg, W.elev[i], W.temp[i]));
      // Fake relief: nudge brightness by elevation so ranges read.
      const e = reg && reg !== REG.BRINE ? Math.max(-0.25, Math.min(0.25, (W.elev[i] || 0) / 4000)) : 0;
      const o = i * 4;
      img.data[o] = clamp8(c.r * (1 + e));
      img.data[o + 1] = clamp8(c.g * (1 + e));
      img.data[o + 2] = clamp8(c.b * (1 + e));
      img.data[o + 3] = 255;
    }
  }
  bx.putImageData(img, 0, 0);
  return buf;
}

let terrainBmp = null;

// drawMap paints the continent + every seat, highlighting the hovered one.
// Returns the transform so hit-testing can map clicks back to grid cells.
function drawMap(canvas, holds, hoverId, chosenId) {
  if (!terrainBmp) terrainBmp = makeTerrainBitmap();
  const ctx = canvas.getContext('2d');
  const scale = Math.max(1, Math.floor(Math.min(canvas.width / GW, canvas.height / GH)));
  const ox = Math.floor((canvas.width - GW * scale) / 2);
  const oy = Math.floor((canvas.height - GH * scale) / 2);

  ctx.fillStyle = '#0d1014';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(terrainBmp, ox, oy, GW * scale, GH * scale);

  for (const h of holds) {
    const px = ox + (h.x + 0.5) * scale;
    const py = oy + (h.y + 0.5) * scale;
    const hovered = h.id === hoverId;
    const chosen = h.id === chosenId;
    const r = chosen ? 7 : hovered ? 6 : 4;
    // danger tints the dot toward red.
    const g = Math.round(200 - h.danger * 150);
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = chosen ? '#ffd479' : `rgb(240,${g},${Math.round(g * 0.7)})`;
    ctx.globalAlpha = hovered || chosen ? 1 : 0.9;
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.stroke();
    ctx.globalAlpha = 1;
    if (hovered || chosen) {
      ctx.font = '12px ui-monospace, monospace';
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.lineWidth = 3;
      const label = `${h.name}`;
      ctx.strokeText(label, px + 9, py + 4);
      ctx.fillText(label, px + 9, py + 4);
    }
  }
  return { scale, ox, oy };
}

// hitTest returns the nearest hold within grab radius of a canvas point.
function hitTest(holds, xf, mx, my, grab = 10) {
  let best = null, bestD = grab * grab;
  for (const h of holds) {
    const px = xf.ox + (h.x + 0.5) * xf.scale;
    const py = xf.oy + (h.y + 0.5) * xf.scale;
    const d = (px - mx) ** 2 + (py - my) ** 2;
    if (d < bestD) { bestD = d; best = h; }
  }
  return best;
}

function hexToRgb(h) { const n = parseInt(h.slice(1), 16); return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 }; }
function clamp8(v) { return Math.max(0, Math.min(255, Math.round(v))); }

window.XANMAP = { drawMap, hitTest };
})();

(function(){
// game.js — the idle hold engine. A chosen hold's geography (from world.js)
// sets its resource richness, danger, and starting buildings; from there
// it's a self-contained ticker with population/labor, a food economy,
// dragon raids, offline catch-up, and localStorage saves. No server, and
// nothing writes back to the sim.

const CFG = {
  tickMs: 250,            // sim resolution
  foodPerPop: 0.02,       // food/s eaten per head
  popGrowth: 0.015,       // head/s per surplus unit, gated by housing + food
  costScale: 1.16,        // per-level upgrade cost multiplier
  raidIntervalS: 135,     // mean seconds between raid checks
  maxOfflineH: 12,        // cap offline catch-up
  baseCaps: { food: 500, timber: 400, stone: 300, ore: 250, salt: 200, coin: 1e9 },
  // Market base coin-price per unit; buying a good you lack is dear,
  // selling one you're rich in is how a hold earns coin.
  basePrice: { food: 0.5, timber: 0.6, stone: 1.1, ore: 1.6, salt: 1.8 },
  tradeLot: 10,
};

// Building catalogue. `rich` is the local-richness key that scales output;
// `gate` is the minimum richness for it to be offered at all. Support
// buildings (housing/storage/defense) produce nothing.
const BUILDINGS = [
  { id: 'farm', name: 'Farmstead', kind: 'prod', res: 'food', base: 0.9, rich: 'food', gate: 0.12,
    cost: { timber: 12, coin: 6 }, desc: 'Grain and pasture on the hold’s good ground.' },
  { id: 'wharf', name: 'Fishing Wharf', kind: 'prod', res: 'food', base: 0.8, rich: 'water', gate: 0.10,
    cost: { timber: 15, stone: 4 }, desc: 'Weirs and boats on river, lake, or shore.' },
  { id: 'sawmill', name: 'Sawmill', kind: 'prod', res: 'timber', base: 0.7, rich: 'timber', gate: 0.10,
    cost: { timber: 8, coin: 8 }, desc: 'Fells and cuts the surrounding forest.' },
  { id: 'quarry', name: 'Quarry', kind: 'prod', res: 'stone', base: 0.6, rich: 'stone', gate: 0.10,
    cost: { timber: 14, coin: 8 }, desc: 'Cuts building stone from crag and foothill.' },
  { id: 'mine', name: 'Deep Mine', kind: 'prod', res: 'ore', base: 0.5, rich: 'ore', gate: 0.12,
    cost: { timber: 20, stone: 12 }, desc: 'Drives shafts after ore in the rock.' },
  { id: 'saltern', name: 'Saltern', kind: 'prod', res: 'salt', base: 0.55, rich: 'salt', gate: 0.10,
    cost: { timber: 16, stone: 10 }, desc: 'Pans and mines the salt — salt is wealth.' },
  { id: 'market', name: 'Market', kind: 'prod', res: 'coin', base: 0.5, rich: 'coin', gate: 0.04,
    cost: { timber: 18, stone: 8 }, desc: 'Caravans and stalls turn goods to coin.' },
  { id: 'longhouse', name: 'Longhouse', kind: 'housing', pop: 6,
    cost: { timber: 20, stone: 6 }, desc: 'Roofs more folk — raises the hold’s people cap.' },
  { id: 'granary', name: 'Storehouse', kind: 'storage', capMul: 0.6,
    cost: { timber: 16, stone: 10 }, desc: 'Granaries and sheds — deeper stores of every good.' },
  { id: 'palisade', name: 'Palisade & Watch', kind: 'defense', def: 1,
    cost: { timber: 24, stone: 20 }, desc: 'Wall and watchtower — blunts the wilds’ raids.' },
];
const BY_ID = Object.fromEntries(BUILDINGS.map((b) => [b.id, b]));

// STORE — localStorage when it's reachable, else an in-memory fallback.
// A sandboxed file: origin (e.g. a flatpak browser's document portal) can
// throw on localStorage access; there the hold still plays, just unsaved.
const STORE = (() => {
  try {
    const k = '__xh__'; localStorage.setItem(k, '1'); localStorage.removeItem(k);
    return { get: (k) => localStorage.getItem(k), set: (k, v) => localStorage.setItem(k, v), del: (k) => localStorage.removeItem(k) };
  } catch (_) {
    const m = new Map();
    return { get: (k) => (m.has(k) ? m.get(k) : null), set: (k, v) => m.set(k, v), del: (k) => m.delete(k) };
  }
})();

// waterRich folds river/lake/sea into one "fishing" richness the wharf reads.
function waterRich(h) {
  const n = h.n;
  return Math.max(0, Math.min(1, n.riverMax * 0.09 + n.lake * 0.12 + n.sea * 0.05));
}

// ancestryMul / tierMul — per-resource output multipliers baked from lore.
function bonuses(h) {
  const mul = { food: 1, timber: 1, stone: 1, ore: 1, salt: 1, coin: 1 };
  let foodEat = 1, defBonus = 0, popCapBonus = 0;
  switch (h.ancestry) {
    case 'Northern': mul.timber *= 1.15; mul.ore *= 1.1; foodEat *= 0.8; break;
    case 'Coastal': mul.coin *= 1.2; mul.food *= 1.12; break;
    case 'cradle': mul.food *= 1.15; break;
  }
  switch (h.tierName) {
    case 'saltern': mul.salt *= 1.5; break;
    case 'capital': mul.coin *= 1.3; popCapBonus += 8; break;
    case 'march': mul.ore *= 1.15; mul.stone *= 1.15; defBonus += 1; break;
    case 'headwater': mul.food *= 1.1; break;
    case 'seat': mul.food *= 1.08; mul.coin *= 1.08; break;
  }
  return { mul, foodEat, defBonus, popCapBonus };
}

class Game {
  constructor(hold, saved) {
    this.h = hold;
    this.water = waterRich(hold);
    this.bon = bonuses(hold);
    if (saved) {
      Object.assign(this, saved);
      this.h = hold; this.water = waterRich(hold); this.bon = bonuses(hold);
    } else {
      this.res = { food: 60, timber: 40, stone: 18, ore: 5, salt: 3, coin: 25 };
      // A hold starts leaning into its richest good.
      const top = Object.entries(hold.rich).sort((a, b) => b[1] - a[1])[0][0];
      this.res[top] = (this.res[top] || 0) + 20;
      this.pop = 8;
      this.lvl = { farm: 1 };
      if (hold.tierName === 'saltern') this.lvl.saltern = 1;
      if (this.water > 0.12) this.lvl.wharf = 1;
      this.founded = Date.now();
      this.log = [];
      this.raidClock = CFG.raidIntervalS;
      this.pushLog(`${hold.name} is yours to steward — a ${hold.tierName} of ${hold.realm}, in the ${hold.region}. The folk look to you.`, 'note');
    }
    this.lastTick = this.lastTick || Date.now();
  }

  // richOf resolves a building's richness key (water is derived).
  richOf(b) { return b.rich === 'water' ? this.water : (this.h.rich[b.rich] || 0); }

  available() {
    return BUILDINGS.filter((b) => {
      if (b.kind !== 'prod') return true;
      // Offered if the land supports it, or you already have one.
      return this.richOf(b) >= b.gate || this.lvl[b.id];
    });
  }

  level(id) { return this.lvl[id] || 0; }

  costOf(id) {
    const b = BY_ID[id];
    const l = this.level(id);
    const out = {};
    for (const [k, v] of Object.entries(b.cost)) out[k] = Math.ceil(v * Math.pow(CFG.costScale, l));
    return out;
  }

  canAfford(id) {
    const c = this.costOf(id);
    return Object.entries(c).every(([k, v]) => this.res[k] >= v);
  }

  build(id) {
    if (!this.canAfford(id)) return false;
    const c = this.costOf(id);
    for (const [k, v] of Object.entries(c)) this.res[k] -= v;
    this.lvl[id] = this.level(id) + 1;
    return true;
  }

  // ---- derived rates -------------------------------------------------
  jobs() {
    let j = 0;
    for (const b of BUILDINGS) if (b.kind === 'prod') j += this.level(b.id);
    return j;
  }

  efficiency() {
    const j = this.jobs();
    return j === 0 ? 1 : Math.max(0, Math.min(1, this.pop / j));
  }

  popCap() {
    let cap = 8 + this.bon.popCapBonus;
    cap += this.level('longhouse') * BY_ID.longhouse.pop;
    return cap;
  }

  defense() { return this.level('palisade') * BY_ID.palisade.def + this.bon.defBonus; }

  caps() {
    const s = 1 + this.level('granary') * BY_ID.granary.capMul;
    const out = {};
    for (const k of Object.keys(CFG.baseCaps)) out[k] = CFG.baseCaps[k] * (k === 'coin' ? 1 : s);
    return out;
  }

  // production per second, per resource, at current efficiency & pop.
  rates() {
    const eff = this.efficiency();
    const out = { food: 0, timber: 0, stone: 0, ore: 0, salt: 0, coin: 0 };
    for (const b of BUILDINGS) {
      if (b.kind !== 'prod') continue;
      const lv = this.level(b.id);
      if (!lv) continue;
      const r = this.richOf(b);
      out[b.res] += b.base * lv * (0.35 + 0.65 * r) * eff * this.bon.mul[b.res];
    }
    return out;
  }

  foodEatPerS() { return this.pop * CFG.foodPerPop * this.bon.foodEat; }

  // ---- trade ---------------------------------------------------------
  // A Market turns the hold's surplus into coin and coin into the goods
  // its land can't yield — the loop that keeps a stone-poor forest hall
  // or an ore-rich frontier alive.
  tradeUnlocked() { return this.level('market') > 0; }
  localRich(res) { return res === 'coin' ? 0 : (this.h.rich[res] || 0); }
  buyPrice(res) { return Math.max(1, Math.ceil(CFG.basePrice[res] * (1.6 - 0.9 * this.localRich(res)))); }
  sellPrice(res) { return Math.max(1, Math.floor(CFG.basePrice[res] * (0.5 + 0.05 * this.level('market')) * (1.2 - 0.5 * this.localRich(res)))); }

  buy(res, qty = CFG.tradeLot) {
    if (!this.tradeUnlocked()) return false;
    const cost = this.buyPrice(res) * qty;
    if (this.res.coin < cost) return false;
    this.res.coin -= cost;
    this.res[res] = Math.min(this.caps()[res], this.res[res] + qty);
    return true;
  }
  sell(res, qty = CFG.tradeLot) {
    if (!this.tradeUnlocked() || this.res[res] < qty) return false;
    this.res[res] -= qty;
    this.res.coin += this.sellPrice(res) * qty;
    return true;
  }

  // ---- the tick ------------------------------------------------------
  // step advances `dt` seconds of sim: production, food/pop, storage caps.
  step(dt, offline = false) {
    const rate = this.rates();
    const caps = this.caps();
    for (const k of Object.keys(rate)) {
      this.res[k] = Math.min(caps[k], (this.res[k] || 0) + rate[k] * dt);
    }
    // Food is eaten; surplus feeds growth, deficit eats the store then folk.
    const eat = this.foodEatPerS() * dt;
    this.res.food -= eat;
    const netFood = rate.food * dt - eat;
    if (this.res.food < 0) {
      // Starvation: clear the debt in people.
      this.res.food = 0;
      this.pop = Math.max(3, this.pop - 0.05 * this.pop * dt);
    } else if (this.pop < this.popCap()) {
      const surplus = Math.max(0, netFood);
      this.pop = Math.min(this.popCap(), this.pop + CFG.popGrowth * (0.5 + surplus) * dt);
    }
    this.stepRaids(dt, offline);
  }

  // stepRaids counts down a raid clock; on a strike, danger (mitigated by
  // defense) is drawn from the stores, occasionally from the people.
  // Offline, raiders strike less often — the frontier is quieter when
  // there's no steward's banner to press.
  stepRaids(dt, offline = false) {
    if (this.h.danger <= 0.01) return;
    this.raidClock -= dt;
    if (this.raidClock > 0) return;
    this.raidClock += CFG.raidIntervalS * (offline ? 4 : 1) * (0.7 + Math.random() * 0.6);
    if (Math.random() > this.h.danger * 0.6) return; // a quiet season
    const mit = Math.max(0.2, 1 - this.defense() * 0.2);
    const bite = this.h.danger * mit;
    const taken = {};
    // A raid falls on one or two kinds of stores, not everything at once.
    for (const k of ['food', 'salt', 'ore', 'coin']) {
      if (Math.random() > 0.5) continue;
      const loss = Math.floor(this.res[k] * bite * (0.1 + Math.random() * 0.14));
      if (loss > 0) { this.res[k] -= loss; taken[k] = loss; }
    }
    let deaths = 0;
    if (bite > 0.55 && this.pop > 5 && Math.random() < 0.5) { deaths = Math.ceil(this.pop * bite * 0.06); this.pop -= deaths; }
    this.raidTally = (this.raidTally || 0) + 1;
    // Offline raids are folded into one summary line by catchUp, so we
    // don't flood the chronicle with a season's worth of skirmishes.
    if (!offline) this.logRaid(taken, deaths, mit);
  }

  logRaid(taken, deaths, mit) {
    const parts = Object.entries(taken).map(([k, v]) => `${v} ${k}`);
    let msg = 'Raiders came down from the wilds';
    if (parts.length) msg += `, carrying off ${parts.join(', ')}`;
    if (deaths) msg += `; ${deaths} of the folk fell`;
    if (!parts.length && !deaths) msg = 'Raiders tested the watch and were driven off';
    if (mit < 0.5) msg += '. The wall held much back.';
    this.pushLog(msg, 'raid');
  }

  pushLog(text, kind = 'note') {
    this.log.unshift({ text, kind, t: Date.now() });
    if (this.log.length > 40) this.log.pop();
  }

  // ---- offline catch-up ---------------------------------------------
  // catchUp folds elapsed real time into the sim in coarse steps and
  // returns a summary for the "while you were away" panel.
  catchUp() {
    const now = Date.now();
    let elapsed = (now - this.lastTick) / 1000;
    this.lastTick = now;
    if (elapsed < 2) return null;
    const capped = Math.min(elapsed, CFG.maxOfflineH * 3600);
    const before = { ...this.res, pop: this.pop };
    const raidsBefore = this.raidTally || 0;
    let t = capped;
    const dt = 5; // coarse offline step
    while (t > 0) { this.step(Math.min(dt, t), true); t -= dt; }
    const gained = {};
    for (const k of Object.keys(this.res)) {
      const d = Math.round(this.res[k] - before[k]);
      if (Math.abs(d) >= 1) gained[k] = d;
    }
    const raids = (this.raidTally || 0) - raidsBefore;
    if (raids > 0) this.pushLog(`In your absence, raiders came down from the wilds ${raids} time${raids > 1 ? 's' : ''}; the watch held what it could.`, 'raid');
    return { seconds: capped, truncated: elapsed > capped, gained, popDelta: Math.round(this.pop - before.pop), raids };
  }

  // ---- persistence ---------------------------------------------------
  serialize() {
    return { res: this.res, pop: this.pop, lvl: this.lvl, founded: this.founded, log: this.log, raidClock: this.raidClock, lastTick: this.lastTick };
  }
  save() { STORE.set('xanhold:' + this.h.id, JSON.stringify(this.serialize())); }
  static load(hold) {
    const raw = STORE.get('xanhold:' + hold.id);
    return new Game(hold, raw ? JSON.parse(raw) : null);
  }
  static hasSave(id) { return STORE.get('xanhold:' + id) != null; }
  static abandon(id) { STORE.del('xanhold:' + id); }
}

window.XANGAME = { Game, BUILDINGS, BY_ID, CFG };
})();

  <script>
(function(){
// app.js — screens, DOM binding, and the render/tick loop that ties the
// map picker (map.js) to the idle engine (game.js).

const { allHolds } = window.XAN;
const { drawMap, hitTest } = window.XANMAP;
const { Game, BUILDINGS, BY_ID } = window.XANGAME;

const HOLDS = allHolds();
const RES_META = {
  food: ['🌾', 'Food'], timber: ['🪵', 'Timber'], stone: ['🪨', 'Stone'],
  ore: ['⛏️', 'Ore'], salt: ['🧂', 'Salt'], coin: ['🪙', 'Coin'],
};
const $ = (s) => document.querySelector(s);

let game = null, hover = null, chosen = null, xf = null, raf = null;

// ---- founding screen ------------------------------------------------
function showFounding() {
  stopLoop();
  $('#founding').style.display = 'flex';
  $('#hold').style.display = 'none';
  const canvas = $('#map');
  fitCanvas(canvas);
  renderMap();
  renderRoster();
  if (!canvas._wired) wireMap(canvas);
}

function fitCanvas(canvas) {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = Math.floor(r.width);
  canvas.height = Math.floor(r.height);
}

function renderMap() {
  const canvas = $('#map');
  xf = drawMap(canvas, HOLDS, hover && hover.id, chosen && chosen.id);
}

function wireMap(canvas) {
  canvas._wired = true;
  canvas.addEventListener('mousemove', (e) => {
    const r = canvas.getBoundingClientRect();
    const h = hitTest(HOLDS, xf, e.clientX - r.left, e.clientY - r.top);
    if ((h && h.id) !== (hover && hover.id)) { hover = h; renderMap(); }
    canvas.style.cursor = h ? 'pointer' : 'default';
  });
  canvas.addEventListener('click', (e) => {
    const r = canvas.getBoundingClientRect();
    const h = hitTest(HOLDS, xf, e.clientX - r.left, e.clientY - r.top);
    if (h) { chosen = h; renderMap(); renderDossier(h); }
  });
  addEventListener('resize', () => { if ($('#founding').style.display !== 'none') { fitCanvas(canvas); renderMap(); } });
}

function renderDossier(h) {
  const saved = Game.hasSave(h.id);
  const stars = (v) => '▰'.repeat(Math.round(v * 5)) + '▱'.repeat(5 - Math.round(v * 5));
  const richRows = window.XAN.RESOURCES.map((k) => {
    const v = k === 'food' ? h.rich.food : h.rich[k];
    return `<div class="richrow"><span>${RES_META[k][0]} ${RES_META[k][1]}</span><b class="bar">${stars(v)}</b></div>`;
  }).join('');
  const feats = h.nearby.length
    ? h.nearby.map((f) => `<span class="chip ${f.kind}">${f.name} <em>${f.kind}</em></span>`).join('')
    : '<span class="dim">no named landmarks close by</span>';
  $('#dossier').innerHTML = `
    <div class="dhead">
      <h2>${h.name}</h2>
      <div class="tier">${h.tierName} · ${h.ancestry} · ${h.region}</div>
    </div>
    <p class="blurb">${h.blurb}</p>
    <div class="statline">
      <span>Realm: <b>${h.realm}${h.realmCrown ? ' 👑' : ''}</b></span>
      <span>Allegiance: <b>${(h.allegiance).toFixed(2)}</b></span>
      <span>Elev: <b>${h.elev}m</b></span>
      <span>Temp: <b>${h.temp}°C</b></span>
      <span>Danger: <b class="${h.danger > 0.5 ? 'bad' : h.danger > 0.25 ? 'warn' : 'good'}">${stars(h.danger)}</b></span>
    </div>
    <div class="rich">${richRows}</div>
    <div class="feats">${feats}</div>
    <button id="foundBtn" class="primary">${saved ? 'Return to ' + h.name : 'Found your hold at ' + h.name}</button>
    ${saved ? `<button id="razeBtn" class="ghost">abandon this hold</button>` : ''}
  `;
  $('#foundBtn').onclick = () => enterHold(h);
  if (saved) $('#razeBtn').onclick = () => { if (confirm(`Abandon ${h.name}? Its saved progress is lost.`)) { Game.abandon(h.id); renderDossier(h); renderRoster(); } };
}

function renderRoster() {
  const saves = HOLDS.filter((h) => Game.hasSave(h.id));
  const el = $('#roster');
  if (!saves.length) { el.innerHTML = '<div class="dim">No holds founded yet — pick a seat on the map.</div>'; return; }
  el.innerHTML = '<div class="rlabel">Your holds</div>' + saves.map((h) =>
    `<button class="rosterItem" data-id="${h.id}">${h.name} <em>${h.tierName}</em></button>`).join('');
  el.querySelectorAll('.rosterItem').forEach((b) => b.onclick = () => {
    const h = HOLDS.find((x) => x.id === b.dataset.id); chosen = h; renderMap(); renderDossier(h); enterHold(h);
  });
}

// ---- hold screen ----------------------------------------------------
function enterHold(h) {
  game = Game.load(h);
  const away = game.catchUp();
  $('#founding').style.display = 'none';
  $('#hold').style.display = 'grid';
  buildHoldChrome(h);
  if (away && (Object.keys(away.gained).length || away.raids)) showAway(away);
  renderHold();
  startLoop();
  game.save();
}

function buildHoldChrome(h) {
  $('#holdName').textContent = h.name;
  $('#holdSub').textContent = `${h.tierName} of ${h.realm}${h.realmCrown ? ' 👑' : ''} · ${h.ancestry} · ${h.region}`;
}

function showAway(a) {
  const g = Object.entries(a.gained).filter(([k]) => RES_META[k])
    .map(([k, v]) => `<span>${RES_META[k][0]} ${v > 0 ? '+' : ''}${v}</span>`).join('');
  const mins = Math.round(a.seconds / 60);
  const time = mins >= 60 ? `${(mins / 60).toFixed(1)}h` : `${mins}m`;
  $('#away').innerHTML = `
    <div class="awaybox">
      <h3>While you were away · ${time}${a.truncated ? ' (capped)' : ''}</h3>
      <div class="awaygains">${g || '<span class="dim">the stores held steady</span>'}</div>
      ${a.popDelta ? `<div>${a.popDelta > 0 ? '👥 the folk grew by ' + a.popDelta : '⚰️ the folk fell by ' + (-a.popDelta)}</div>` : ''}
      ${a.raids ? `<div class="bad">⚔️ raiders struck ${a.raids} time${a.raids > 1 ? 's' : ''}</div>` : ''}
      <button onclick="document.getElementById('away').innerHTML=''" class="primary">Take up the stewardship</button>
    </div>`;
}

function renderHold() {
  if (!game) return;
  renderResources();
  renderPeople();
  renderBuildings();
  renderMarket();
  renderLog();
}

function renderMarket() {
  const panel = $('#marketPanel');
  if (!game.tradeUnlocked()) {
    panel.style.display = 'block';
    $('#market').innerHTML = '<div class="dim">Build a <b>Market</b> to open trade — sell what your land yields, buy what it lacks.</div>';
    return;
  }
  panel.style.display = 'block';
  const rows = ['food', 'timber', 'stone', 'ore', 'salt'].map((k) => {
    const buy = game.buyPrice(k), sell = game.sellPrice(k);
    const canBuy = game.res.coin >= buy * window.XANGAME.CFG.tradeLot;
    const canSell = game.res[k] >= window.XANGAME.CFG.tradeLot;
    return `<div class="trow">
      <span class="tname">${RES_META[k][0]} ${RES_META[k][1]}</span>
      <button class="tbtn ${canBuy ? '' : 'no'}" data-act="buy" data-res="${k}">buy 10 · 🪙${buy * 10}</button>
      <button class="tbtn sell ${canSell ? '' : 'no'}" data-act="sell" data-res="${k}">sell 10 · 🪙${sell * 10}</button>
    </div>`;
  }).join('');
  $('#market').innerHTML = rows;
  $('#market').querySelectorAll('.tbtn').forEach((b) => b.onclick = () => {
    const ok = b.dataset.act === 'buy' ? game.buy(b.dataset.res) : game.sell(b.dataset.res);
    if (ok) { renderResources(); renderMarket(); game.save(); }
  });
}

function renderResources() {
  const rate = game.rates();
  const caps = game.caps();
  const eatFood = game.foodEatPerS();
  $('#resbar').innerHTML = window.XAN.RESOURCES.map((k) => {
    let net = rate[k];
    if (k === 'food') net -= eatFood;
    const cls = net > 0.001 ? 'up' : net < -0.001 ? 'down' : 'flat';
    const capTxt = k === 'coin' ? '' : `<span class="cap">/ ${Math.floor(caps[k])}</span>`;
    return `<div class="res">
      <div class="ricon">${RES_META[k][0]}</div>
      <div class="rbody"><div class="rval">${Math.floor(game.res[k])}${capTxt}</div>
      <div class="rrate ${cls}">${net >= 0 ? '+' : ''}${net.toFixed(2)}/s</div></div>
    </div>`;
  }).join('');
}

function renderPeople() {
  const eff = Math.round(game.efficiency() * 100);
  $('#people').innerHTML = `
    <span>👥 <b>${Math.floor(game.pop)}</b> / ${Math.floor(game.popCap())} folk</span>
    <span>🛠️ ${game.jobs()} jobs · <b class="${eff < 100 ? 'warn' : 'good'}">${eff}%</b> staffed</span>
    <span>🛡️ defense <b>${game.defense()}</b></span>`;
}

function renderBuildings() {
  const avail = game.available();
  $('#buildings').innerHTML = avail.map((b) => {
    const lv = game.level(b.id);
    const cost = game.costOf(b.id);
    const afford = game.canAfford(b.id);
    const costTxt = Object.entries(cost).map(([k, v]) =>
      `<span class="c ${game.res[k] >= v ? '' : 'short'}">${RES_META[k][0]}${v}</span>`).join(' ');
    const detail = buildingDetail(b, lv);
    return `<div class="bld ${lv ? 'owned' : ''}">
      <div class="bhead"><span class="bname">${b.name}</span><span class="blv">${lv ? 'lv ' + lv : ''}</span></div>
      <div class="bdesc">${b.desc}</div>
      <div class="bdetail">${detail}</div>
      <button class="bbuy ${afford ? '' : 'no'}" data-id="${b.id}">${lv ? 'Upgrade' : 'Build'} · ${costTxt}</button>
    </div>`;
  }).join('');
  $('#buildings').querySelectorAll('.bbuy').forEach((btn) => btn.onclick = () => {
    if (game.build(btn.dataset.id)) { renderHold(); game.save(); }
  });
}

function buildingDetail(b, lv) {
  if (b.kind === 'prod') {
    const r = game.richOf(b);
    const per = b.base * (0.35 + 0.65 * r) * game.bon.mul[b.res];
    return `${RES_META[b.res][0]} ~${per.toFixed(2)}/s per level · land ${'▰'.repeat(Math.round(r * 5))}${'▱'.repeat(5 - Math.round(r * 5))}`;
  }
  if (b.kind === 'housing') return `👥 +${b.pop} people cap per level`;
  if (b.kind === 'storage') return `📦 +${Math.round(b.capMul * 100)}% storage per level`;
  if (b.kind === 'defense') return `🛡️ +${b.def} defense per level (blunts raids)`;
  return '';
}

function renderLog() {
  const el = $('#log');
  if (!game.log.length) { el.innerHTML = '<div class="dim">The hold’s chronicle is empty. It begins now.</div>'; return; }
  el.innerHTML = game.log.map((l) => `<div class="logline ${l.kind}">${l.text}</div>`).join('');
}

// ---- loop -----------------------------------------------------------
let lastRender = 0, lastSave = 0;
function startLoop() {
  stopLoop();
  const loop = (ts) => {
    raf = requestAnimationFrame(loop);
    const now = Date.now();
    const dt = Math.min(1, (now - game.lastTick) / 1000);
    if (dt > 0.2) { game.step(dt); game.lastTick = now; }
    if (ts - lastRender > 200) { renderHold(); lastRender = ts; }
    if (now - lastSave > 4000) { game.save(); lastSave = now; }
  };
  raf = requestAnimationFrame(loop);
}
function stopLoop() { if (raf) cancelAnimationFrame(raf); raf = null; }

// ---- boot -----------------------------------------------------------
$('#toMap').onclick = () => { if (game) game.save(); showFounding(); };
addEventListener('beforeunload', () => { if (game) game.save(); });
document.addEventListener('visibilitychange', () => { if (document.hidden && game) game.save(); });

$('#worldMeta').textContent = `world seed ${window.WORLD.seed} · ${window.WORLD.era} · ${HOLDS.length} seats`;
showFounding();
})();

</script>
</body>
